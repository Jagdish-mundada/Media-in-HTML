<!Doctype html>
<html>
    <head>
        <title>Media in html</title>
    </head>
    <body>
        <!---image-->
        <h1>HTML IMAGE</h1>
        <img src="flower.jpg" alt="FRONT" width="400" height="200">

        <!---audio and video-->
        <h1>HTML AUDIO AND VIDEO</h1>
        <audio controls>
            <source src="loop_music.mp3" type="audio/mpeg">
            Your browser does not support the audio tag.
        </audio>

        <p>This is one of my favourite video</p>
        <video controls width="500" height="400">
        <source src="why_coding_imp.mp4" type="video/mp4">
        Your browser does not support the video tag
        </video>

        <!---IFRAME-->
       <h1>HTML iframe</h1>
      <iframe src="http://scratch.mit.edu/projects/60917032/embed" height="400"></iframe>
    </iframe>
    </body>
</html>
